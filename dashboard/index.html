<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel Zero — Live Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">🛡️</span>
      <div>
        <h1>Sentinel Zero <span class="local-badge">LOCAL</span></h1>
        <p class="subtitle">Real-time phishing detection · 100% local processing · zero external calls</p>
      </div>
      <div id="status-dot" class="status-dot offline" title="API status"></div>
    </div>
  </header>

  <main>
    <!-- Stat cards -->
    <section class="cards-grid" id="cards-grid">
      <div class="card">
        <div class="card-value" id="c-total">—</div>
        <div class="card-label">Total Checks</div>
      </div>
      <div class="card danger">
        <div class="card-value" id="c-phishing">—</div>
        <div class="card-label">Phishing Detected</div>
      </div>
      <div class="card warn">
        <div class="card-value" id="c-avg-lat">—</div>
        <div class="card-label">Avg Latency (ms)</div>
      </div>
      <div class="card warn">
        <div class="card-value" id="c-p95-lat">—</div>
        <div class="card-label">p95 Latency (ms)</div>
      </div>
      <div class="card" id="c-sla-card">
        <div class="card-value" id="c-sla">—</div>
        <div class="card-label">SLA Compliance</div>
      </div>
      <div class="card">
        <div class="card-value" id="c-uptime">—</div>
        <div class="card-label">Uptime (s)</div>
      </div>
    </section>

    <!-- Charts -->
    <section class="charts-row">
      <div class="chart-box">
        <h2>Latency History (ms)</h2>
        <canvas id="latencyChart"></canvas>
      </div>
      <div class="chart-box">
        <h2>Detection Breakdown</h2>
        <canvas id="detectionChart"></canvas>
      </div>
    </section>

    <!-- Manual URL check -->
    <section class="check-panel">
      <h2>Quick URL Check</h2>
      <div class="check-row">
        <input id="url-input" type="url" placeholder="https://example.com" autocomplete="off" />
        <button id="check-btn">Analyse</button>
      </div>
      <div id="check-result" class="check-result hidden"></div>
    </section>

    <!-- Privacy report -->
    <section class="privacy-panel">
      <h2>Privacy Report</h2>
      <div id="privacy-report">Loading…</div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
