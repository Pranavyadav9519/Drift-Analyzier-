<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trader Bank Login</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 320px; }
    h1 { margin-top: 0; font-size: 24px; color: #111827; }
    .input-grp { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
    input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
  <!-- Load the extension content script directly for the demo to bypass needing to install the extension manually -->
  <script src="../extension/content.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>Trader Bank Hub</h1>
    <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Please login to access your trading portfolio.</p>
    <form action="#" method="POST">
      <div class="input-grp">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="trader_john" />
      </div>
      <div class="input-grp">
        <label for="password">Password (Try 'trader123')</label>
        <input type="password" id="password" name="password" placeholder="Enter password" />
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
