# docker-compose.yml — Drift Analyzer
#
# Only two core services run here:
#   1. phishing-api  — Flask URL phishing detection (port 5050)
#   2. ml-service    — Isolation Forest anomaly detection (port 5001)
#
# No MongoDB. No frontend. No backend middleware.
# Zero data persistence — everything lives in-memory while services run.

version: '3.8'

services:
  # ── Phishing Detection API (Flask) ─────────────────────────────────────────
  # Analyses URLs in real time using RandomForest + rule-based heuristics.
  # The browser extension calls POST /threat to get verdicts + remedy steps.
  phishing-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drift_phishing_api
    ports:
      - '5050:5050'
    environment:
      - PORT=5050
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── ML Anomaly Detection Service (Flask + Isolation Forest) ────────────────
  # Detects unusual login/access patterns per user session.
  # System monitor calls POST /threat/predict to score system events.
  ml-service:
    build: ./ml-service
    container_name: drift_ml_service
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
